name: DevOps Demo Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-and-docker:
    runs-on: ubuntu-latest 

    steps:
    - name: 1. Clone Code từ Repo về Server ảo
      uses: actions/checkout@v3

    - name: 2. Cài đặt môi trường .NET 8
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: 3. Tải các thư viện (Restore)
      run: |
        dotnet restore MyApi/MyApi.csproj
        dotnet restore MyApi.Tests/MyApi.Tests.csproj

    - name: 4. Biên dịch mã nguồn (Build)
      run: |
        dotnet build MyApi/MyApi.csproj --no-restore
        dotnet build MyApi.Tests/MyApi.Tests.csproj --no-restore

    - name: 5. Chạy kiểm thử (Unit Test)
      run: dotnet test MyApi.Tests/MyApi.Tests.csproj --no-build --verbosity normal

    - name: 6. Đóng gói ứng dụng thành Docker Image
      run: docker build -t my-devops-api:latest .